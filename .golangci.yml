version: '2'

linters:
  default: standard
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funcorder
    - gocheckcompilerdirectives
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - modernize
    - musttag
    - nakedret
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - staticcheck
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  settings:
    revive:
      rules:
        - name: unused-parameter
          disabled: true
    depguard:
      rules:
        main:
          files:
            - $all
            - '!$test'
            - '!**/test/**/*'
          allow:
            - $gostd
            - github.com/strider2038/knowledge-db
            - github.com
            - google.golang.org
          deny:
            - pkg: github.com/pkg/errors
              desc: use github.com/muonsoft/errors instead
            - pkg: reflect
              desc: Please don't use reflect package
            - pkg: golang.org/x/exp
              desc: Please don't use experimental packages
            - pkg: golang.org/x/net/context
              desc: use context
        test:
          files:
            - $test
          allow:
            - $gostd
            - github.com/strider2038/knowledge-db
            - github.com
            - google.golang.org
  exclusions:
    generated: lax
    warn-unused: true
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
      # CLI tools используют fmt.Print для вывода; простые fmt.Errorf для ошибок
      - path: cmd/
        linters:
          - forbidigo
          - err113
      # Telegram API использует snake_case в JSON
      - path: internal/telegram
        linters:
          - tagliatelle
      # validateNode намеренно возвращает nil при нарушении (собирает violations)
      - path: internal/kb/validate.go
        linters:
          - nilerr
      # buildTree передаёт basePath в рекурсивный вызов
      - path: internal/kb/tree.go
        linters:
          - unparam
      # Проект использует fmt.Errorf для простых ошибок (err113 — sentinel)
      - path: cmd/
        linters:
          - err113
      - path: internal/telegram
        linters:
          - err113
