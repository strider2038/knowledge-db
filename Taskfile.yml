version: "3"

vars:
  WEB_DIR: ./web
  UI_STATIC: ./internal/ui/static

tasks:
  web:install:
    desc: Установить зависимости web
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm install

  web:dev:
    desc: Запустить Vite dev server (HMR, прокси /api на :8080)
    dir: "{{.WEB_DIR}}"
    deps: [web:install]
    cmds:
      - npm run dev

  web:build:
    desc: Собрать web (Vite)
    dir: "{{.WEB_DIR}}"
    deps: [web:install]
    cmds:
      - npm run build

  web:test:
    desc: Запустить тесты web (Vitest)
    dir: "{{.WEB_DIR}}"
    deps: [web:install]
    cmds:
      - npm run test

  web:lint:
    desc: Запустить ESLint для web
    dir: "{{.WEB_DIR}}"
    deps: [web:install]
    cmds:
      - npm run lint

  web:lint:fix:
    desc: ESLint с автоисправлением
    dir: "{{.WEB_DIR}}"
    deps: [web:install]
    cmds:
      - npm run lint -- --fix

  build-server:
    desc: Собрать kb-server (web → copy → go build)
    deps: [web:build]
    cmds:
      - mkdir -p {{.UI_STATIC}}
      - cp -r {{.WEB_DIR}}/dist/* {{.UI_STATIC}}/
      - go build -o kb-server ./cmd/kb-server

  build-cli:
    desc: Собрать kb-cli
    cmds:
      - go build -o kb-cli ./cmd/kb-cli

  build:
    desc: Собрать всё (web + kb-server + kb-cli)
    cmds:
      - task: web:build
      - mkdir -p {{.UI_STATIC}}
      - cp -r {{.WEB_DIR}}/dist/* {{.UI_STATIC}}/
      - go build -o kb-server ./cmd/kb-server
      - go build -o kb-cli ./cmd/kb-cli

  server:dev:
    desc: Запустить kb-server с hot reload (air)
    deps: [web:build]
    cmds:
      - mkdir -p {{.UI_STATIC}}
      - cp -r {{.WEB_DIR}}/dist/* {{.UI_STATIC}}/
      - air

  server:dev:install:
    desc: Установить air (go install)
    cmds:
      - go install github.com/air-verse/air@latest

  dev:
    desc: Подсказка — запустите в двух терминалах task web:dev и task server:dev
    cmds:
      - |
        echo "Для разработки запустите в двух терминалах:"
        echo "  1) task web:dev     - Vite dev server (HMR, прокси /api)"
        echo "  2) task server:dev  - kb-server с hot reload (air)"
        echo ""
        echo "Откройте http://localhost:5173 (Vite)"

  test:
    desc: Запустить тесты (Go + web)
    cmds:
      - go test ./... -race
      - task: web:test

  lint:
    desc: Запустить линтеры (golangci-lint + ESLint)
    cmds:
      - golangci-lint run ./...
      - task: web:lint

  lint:fix:
    desc: Линтеры с автоисправлением (golangci-lint + ESLint)
    cmds:
      - golangci-lint run ./... --fix
      - task: web:lint:fix

  lint:install:
    desc: Установить golangci-lint
    cmds:
      - |
        if ! command -v golangci-lint &> /dev/null; then
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
        else
          echo "golangci-lint is already installed"
        fi
