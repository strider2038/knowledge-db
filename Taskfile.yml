version: "3"

vars:
  WEB_DIR: ./web
  UI_STATIC: ./internal/ui/static

tasks:
  web:install:
    desc: Установить зависимости web
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm install

  web:dev:
    desc: Запустить Vite dev server (HMR, прокси /api на :8080)
    dir: "{{.WEB_DIR}}"
    deps: [web:install]
    cmds:
      - npm run dev

  web:build:
    desc: Собрать web (Vite)
    dir: "{{.WEB_DIR}}"
    deps: [web:install]
    cmds:
      - npm run build

  build-server:
    desc: Собрать kb-server (web → copy → go build)
    deps: [web:build]
    cmds:
      - mkdir -p {{.UI_STATIC}}
      - cp -r {{.WEB_DIR}}/dist/* {{.UI_STATIC}}/
      - go build -o kb-server ./cmd/kb-server

  build-cli:
    desc: Собрать kb-cli
    cmds:
      - go build -o kb-cli ./cmd/kb-cli

  build:
    desc: Собрать всё (web + kb-server + kb-cli)
    cmds:
      - task: web:build
      - mkdir -p {{.UI_STATIC}}
      - cp -r {{.WEB_DIR}}/dist/* {{.UI_STATIC}}/
      - go build -o kb-server ./cmd/kb-server
      - go build -o kb-cli ./cmd/kb-cli

  server:dev:
    desc: Запустить kb-server с hot reload (air)
    deps: [web:build]
    cmds:
      - mkdir -p {{.UI_STATIC}}
      - cp -r {{.WEB_DIR}}/dist/* {{.UI_STATIC}}/
      - air

  server:dev:install:
    desc: Установить air (go install)
    cmds:
      - go install github.com/air-verse/air@latest

  dev:
    desc: Подсказка — запустите в двух терминалах task web:dev и task server:dev
    cmds:
      - |
        echo "Для разработки запустите в двух терминалах:"
        echo "  1) task web:dev     - Vite dev server (HMR, прокси /api)"
        echo "  2) task server:dev  - kb-server с hot reload (air)"
        echo ""
        echo "Откройте http://localhost:5173 (Vite)"

  test:
    desc: Запустить тесты
    cmds:
      - go test ./...

  lint:
    desc: Запустить golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: golangci-lint с автоисправлением
    cmds:
      - golangci-lint run ./... --fix
